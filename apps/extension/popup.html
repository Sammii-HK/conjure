<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conjure</title>
  <style>
    body {
      width: 300px;
      padding: 16px;
      background: #0a0a0f;
      color: #e2e8f0;
      font-family: Inter, system-ui, sans-serif;
      font-size: 13px;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .logo {
      font-size: 16px;
      font-weight: 700;
      color: #7c3aed;
    }
    p {
      color: #94a3b8;
      line-height: 1.5;
      margin: 0 0 12px;
    }
    a {
      display: block;
      background: #7c3aed;
      color: white;
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
    }
    a:hover {
      background: #6d28d9;
    }
    .tip {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      background: #12121a;
      border: 1px solid #1e1e2e;
      color: #94a3b8;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">Conjure</span>
  </div>
  <p>AI-powered prompt builder for Midjourney, FLUX, and DALL·E.</p>
  <a href="http://localhost:3000" target="_blank">Open Conjure</a>
  <div class="tip">
    Navigate to <strong>midjourney.com</strong> to use the side panel — click the purple CONJURE tab on the right edge.
  </div>
</body>
</html>
